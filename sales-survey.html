<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sales Campaign Confirmation Survey</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f3f4f6;
      color: #1f2937;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 32px 16px;
    }
    .card {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.12);
      padding: 32px;
      width: 100%;
      max-width: 560px;
    }
    .logo-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 24px;
    }
    .logo-bar .brand {
      font-size: 13px;
      font-weight: 600;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    h1 { font-size: 20px; font-weight: 700; color: #111827; margin-bottom: 6px; }
    .subtitle { font-size: 14px; color: #6b7280; margin-bottom: 28px; line-height: 1.5; }
    .field-group { margin-bottom: 16px; }
    label { display: block; font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 5px; }
    label .required { color: #ef4444; margin-left: 2px; }
    input[type="date"], input[type="text"] {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 14px;
      color: #111827;
      background: #fff;
      transition: border-color 0.15s;
      -webkit-appearance: none;
    }
    input[type="date"]:focus, input[type="text"]:focus {
      outline: none;
      border-color: #1f73b7;
      box-shadow: 0 0 0 3px rgba(31,115,183,0.15);
    }
    input.error { border-color: #ef4444; }
    .field-error { font-size: 12px; color: #ef4444; margin-top: 4px; display: none; }
    .field-error.visible { display: block; }
    .checkbox-group { display: flex; flex-direction: column; gap: 8px; }
    .checkbox-item { display: flex; align-items: center; gap: 10px; cursor: pointer; }
    .checkbox-item input[type="checkbox"] {
      width: 16px; height: 16px; accent-color: #1f73b7; cursor: pointer; flex-shrink: 0;
    }
    .checkbox-item span { font-size: 14px; color: #374151; }
    .franchise-field { margin-top: 12px; }
    .submit-btn {
      width: 100%;
      padding: 12px;
      background: #1f73b7;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 28px;
      transition: background 0.15s;
    }
    .submit-btn:hover:not(:disabled) { background: #1a5f9a; }
    .submit-btn:disabled { background: #9ca3af; cursor: not-allowed; }
    .status-box { display: none; padding: 16px; border-radius: 6px; margin-top: 20px; font-size: 14px; line-height: 1.5; }
    .status-box.success { display: block; background: #ecfdf5; border: 1px solid #6ee7b7; color: #065f46; }
    .status-box.error { display: block; background: #fef2f2; border: 1px solid #fca5a5; color: #991b1b; }
    .status-box h3 { font-size: 15px; font-weight: 700; margin-bottom: 6px; }
    .spinner {
      display: inline-block; width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.4); border-top-color: #fff;
      border-radius: 50%; animation: spin 0.7s linear infinite;
      vertical-align: middle; margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .token-error { text-align: center; padding: 40px 20px; color: #991b1b; }
    .token-error h2 { font-size: 18px; margin-bottom: 8px; }
    .token-error p { font-size: 14px; color: #6b7280; }
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    @media (max-width: 480px) {
      .two-col { grid-template-columns: 1fr; }
      .card { padding: 20px; }
    }
  </style>
</head>
<body>
<div class="card" id="main-card">
  <div class="logo-bar">
    <span class="brand">Sales Campaign Survey</span>
  </div>
  <h1>Campaign Confirmation</h1>
  <p class="subtitle" id="greeting">Please complete the details below to confirm your campaign parameters.</p>
  <form id="survey-form" novalidate>
    <div class="two-col">
      <div class="field-group">
        <label for="flight_start_date">Flight Start Date <span class="required">*</span></label>
        <input type="date" id="flight_start_date" name="flight_start_date" required />
        <div class="field-error" id="err_flight_start_date">Required.</div>
      </div>
      <div class="field-group">
        <label for="flight_end_date">Flight End Date <span class="required">*</span></label>
        <input type="date" id="flight_end_date" name="flight_end_date" required />
        <div class="field-error" id="err_flight_end_date">Required.</div>
      </div>
    </div>
    <div class="field-group">
      <label for="total_spend">Total Spend ($) <span class="required">*</span></label>
      <input type="text" id="total_spend" name="total_spend" inputmode="numeric" placeholder="e.g. 250,000" required />
      <div class="field-error" id="err_total_spend">Required.</div>
    </div>
    <div class="field-group">
      <label for="total_imps">Total Imps <span class="required">*</span></label>
      <input type="text" id="total_imps" name="total_imps" inputmode="numeric" placeholder="e.g. 15,000,000" required />
      <div class="field-error" id="err_total_imps">Required.</div>
    </div>
    <div class="two-col">
      <div class="field-group">
        <label for="youtube_dm_imps">YouTube D/M Imps</label>
        <input type="text" id="youtube_dm_imps" name="youtube_dm_imps" inputmode="numeric" placeholder="Optional" />
      </div>
      <div class="field-group">
        <label for="youtube_ctv_imps">YouTube CTV Imps</label>
        <input type="text" id="youtube_ctv_imps" name="youtube_ctv_imps" inputmode="numeric" placeholder="Optional" />
      </div>
    </div>
    <div class="field-group">
      <label for="off_youtube_ctv_imps">Off-YouTube CTV Imps</label>
      <input type="text" id="off_youtube_ctv_imps" name="off_youtube_ctv_imps" inputmode="numeric" placeholder="Optional" />
    </div>
    <div class="field-group">
      <label>Sponsorship Type</label>
      <div class="checkbox-group">
        <label class="checkbox-item">
          <input type="checkbox" name="sponsorship_type" value="Artist Franchise" />
          <span>Artist Franchise</span>
        </label>
        <label class="checkbox-item">
          <input type="checkbox" name="sponsorship_type" value="Event or Award Show" />
          <span>Event or Award Show</span>
        </label>
        <label class="checkbox-item">
          <input type="checkbox" name="sponsorship_type" value="Holiday" />
          <span>Holiday</span>
        </label>
        <label class="checkbox-item">
          <input type="checkbox" name="sponsorship_type" value="Concert" />
          <span>Concert</span>
        </label>
      </div>
    </div>
    <div class="field-group franchise-field">
      <label for="franchise_artist_name">Ad Products/Sponsorship(s) included</label>
      <input type="text" id="franchise_artist_name" name="franchise_artist_name" placeholder="e.g. Taylor Swift Eras Tour" />
    </div>
    <div class="field-group">
      <label>Create Client-Facing Nielsen Dashboard? (If applicable) <span class="required">*</span></label>
      <div class="checkbox-group" style="flex-direction: row; gap: 20px;">
        <label class="checkbox-item">
          <input type="radio" name="nielsen_dashboard" value="Yes" required />
          <span>Yes</span>
        </label>
        <label class="checkbox-item">
          <input type="radio" name="nielsen_dashboard" value="No" />
          <span>No</span>
        </label>
      </div>
      <div class="field-error" id="err_nielsen_dashboard">Required.</div>
    </div>
    <button type="submit" class="submit-btn" id="submit-btn">Submit Survey</button>
    <div class="status-box" id="status-box"></div>
  </form>
</div>
